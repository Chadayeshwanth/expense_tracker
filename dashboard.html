<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Dashboard</title>

    <link rel="stylesheet" href="frontend/css/style.css">
    <link rel="stylesheet" href="frontend/css/dashboard.css">
</head>

<body onload="loadExpenses()">
    <div class="dashboard-shell">
        <header class="dashboard-header">
            <div>
                <p class="eyebrow">Personal finance</p>
                <h1>Expense Tracker</h1>
            </div>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </header>

        <section class="card form-card">
            <h2>Add a new expense</h2>
            <div class="form-grid">
                <input type="text" id="title" placeholder="Expense title" required>
                <input type="number" id="amount" placeholder="Amount" min="0" step="0.01" required>
                <input type="text" id="category" placeholder="Category" required>
                <input type="date" id="expense_date" required>
            </div>
            <textarea id="description" placeholder="Short note"></textarea>
            <button class="primary-btn" onclick="addExpense()">Add Expense</button>
        </section>

        <section class="card table-card">
            <div class="table-header">
                <h2>Recent expenses</h2>
                <span id="summary" class="summary-pill">Loading...</span>
            </div>
            <table>
                <thead>
                    <tr>
                        <th>Title</th>
                        <th>Amount</th>
                        <th>Category</th>
                        <th>Date</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="expenseTable"></tbody>
            </table>
        </section>
    </div>

    <script src="frontend/js/api.js"></script>
    <script src="frontend/js/dashboard.js"></script>
</body>
</html>
